AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront CDN and OAC for ammas-banner media delivery

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]

Resources:

  # OAC — Origin Access Control (replaces legacy OAI)
  MediaCdnOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "ammas-media-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # The S3 bucket is defined in the root template (required for SAM S3 event
  # wiring). The bucket name follows the deterministic pattern below so this
  # stack can reference it without a circular dependency.
  MediaCdn:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "ammas-banner media CDN (${Environment})"
        Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: MediaBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        Origins:
          - Id: MediaBucketOrigin
            DomainName: !Sub "ammas-media-${AWS::AccountId}-${Environment}.s3.${AWS::Region}.amazonaws.com"
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt MediaCdnOAC.Id

Outputs:
  MediaBucketName:
    Value: !Sub "ammas-media-${AWS::AccountId}-${Environment}"
    Export: { Name: !Sub "ammas-MediaBucketName-${Environment}" }
  MediaBucketArn:
    Value: !Sub "arn:aws:s3:::ammas-media-${AWS::AccountId}-${Environment}"
    Export: { Name: !Sub "ammas-MediaBucketArn-${Environment}" }
  MediaCdnDomain:
    Value: !GetAtt MediaCdn.DomainName
    Export: { Name: !Sub "ammas-MediaCdnDomain-${Environment}" }
  MediaCdnId:
    Value: !Ref MediaCdn
    Export: { Name: !Sub "ammas-MediaCdnId-${Environment}" }
