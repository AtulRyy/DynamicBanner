    <!-- Optional JS for scroll interactions -->
    <script>
    var owl = $('.home-carousel');

owl.owlCarousel({
    items: 1,
    loop: true,
    nav: false,
    dots: false,
    autoplay: true,
    autoplayTimeout: 5000,
    autoplayHoverPause: false,
    smartSpeed: 1500
});

// Handle slide changes
owl.on('changed.owl.carousel', function(event) {

    // Pause all videos
    $('.slide-video').each(function () {
        this.pause();
        this.currentTime = 0;
    });

    var currentItem = $(event.target)
        .find('.owl-item')
        .eq(event.item.index);

    var video = currentItem.find('video').get(0);

    if (video) {

        // Stop owl autoplay while video plays
        owl.trigger('stop.owl.autoplay');

        video.play();

        video.onended = function () {

            // Move to next slide
            owl.trigger('next.owl.carousel');

            // Restart image autoplay
            owl.trigger('play.owl.autoplay', [5000]);
        };
    }
});

// Check first slide on load
setTimeout(function () {
    owl.trigger('changed.owl.carousel');
}, 500);
const homeMenuCard = document.getElementById('homeMenuCard');
