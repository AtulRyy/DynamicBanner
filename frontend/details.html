<!DOCTYPE html>

<body class="flex h-screen overflow-hidden">

<input type="checkbox" class="hidden" checked>

<i class="fa-solid fa-check text-[10px] hidden"></i>
</div>
</label>
            <button class="flex items-center gap-2  px-4 md:px-3 py-2 lg:rounded-[10px] sm:rounded-[8px] rounded-[6px] lg:text-[17px] sm:text-[15px] text-[13px] font-medium text-white bg-[#F36E21]">
                
                <span class="uppercase  whitespace-nowrap">Orders</span>
                </button>
                </div>
         </div>
        </div>

    <div class=""><hr class="border-[#CCCCCC]"></div>

    <div class="flex-1 overflow-y-auto custom-scroll px-4 md:px-8 lg:px-10">
         <div class="lg:pb-12 pb-8 sm:pb-10">

                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center">
                <i class="fa-solid fa-bars"></i>

                <h3 class="literata text-[25px] md:text-[30px] lg:text-[35px] !leading-normal">Images</h3>
                <label class="flex mt-2 items-center h-full  rounded-[10px] rounded-br-0 bg-white cursor-pointer custom-checkbox">
<input type="checkbox" class="hidden" checked>

    <i class="fa-solid fa-cloud-arrow-up"></i>
    <span class="uppercase whitespace-nowrap">Upload Image</span>
</label>
<input type="file" id="imageUpload" accept="image/*" class="hidden">
</div>
            </div>
            <div id="card-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-6 gap-4 xl:gap-5"></div>
            </div>
        
        <div class="lg:pb-12 pb-8 sm:pb-10">
             <div class="pb-4 md:pb-8 lg:pb-10 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center">

    <i class="fa-solid fa-cloud-arrow-up"></i>
    <span class="uppercase whitespace-nowrap">Upload Videos</span>
</label>
<input type="file" id="videoUpload" accept="video/*" multiple class="hidden"/>

<input type="checkbox" class="hidden" checked>

<i class="fa-solid fa-check text-[10px] hidden"></i>
</div>
</label>

            <div class="">

                </div> -->

            <div class="my-5 "></div>

                <span class="text-black text-sm sm:text-base lg:text-lg font-medium">Whether it's a holiday sale for your business, a special family event, a holiday schedule change, or a pregnancy</span>

                <input type="checkbox" class="mt-[6px] announcements-checkbox" value="2" checked>
                <span class="text-black text-sm sm:text-base lg:text-lg font-medium">Whether it's a holiday sale for your business, a special family event, a holiday schedule change, or a pregnancy</span>
            </label>

            </label>

            <!-- Row 4 -->
            <label class="bg-[#f2f2f2] p-4 flex gap-4 rounded-sm cursor-pointer">
                <input type="checkbox" class="mt-[6px] announcements-checkbox" value="4" checked>
                <span class="text-black text-sm sm:text-base lg:text-lg font-medium">Whether it's a holiday sale for your business, a special family event, a holiday schedule change, or a pregnancy</span>
            </label>

            <!-- Row 5 -->
            <label class="bg-[#f2f2f2] p-4 flex gap-4 rounded-sm cursor-pointer">
                <input type="checkbox" class="mt-[6px] announcements-checkbox" value="5" checked>
                <span class="text-black text-sm sm:text-base lg:text-lg font-medium">Whether it's a holiday sale for your business, a special family event, a holiday schedule change, or a pregnancy</span>
            </label>

        <!-- Bottom Submit Button for List -->
        <div class="flex justify-end lg:mt-8 sm:mt-6 mt-4">

             <button onclick="updateAnnouncementList()" class="flex-1 md:flex-none px-6 md:px-8 py-2 border border-[#F36E21] lg:rounded-[10px] sm:rounded-[8px] rounded-[6px] lg:text-[17px] sm:text-[15px] text-[13px] font-medium banner-gradient text-white">Submit</button>

        </div>

<footer class="fixed bottom-0 left-0 right-0 lg:left-72 bg-white/95 backdrop-blur-md border-t border-gray-100 p-4 md:p-6 flex justify-center md:justify-end gap-3 z-20">

<button class="flex-1 md:flex-none px-6 md:px-8 py-2 border border-[#F36E21] lg:rounded-[10px] sm:rounded-[8px] rounded-[6px] lg:text-[17px] sm:text-[15px] text-[13px]  font-medium hover-gradient hover:text-white">Submit</button>
</footer>
