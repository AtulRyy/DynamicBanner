AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ammas-banner — Centralized Ad Carousel Board (root template)

# ── Parameters ────────────────────────────────────────────────────────────────

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
    Description: Deployment environment

# ── Globals ───────────────────────────────────────────────────────────────────
# Defaults applied to every AWS::Serverless::Function unless overridden

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures: [x86_64]
    Environment:
      Variables:
        NODE_ENV: !Ref Environment

# ── Shared Infrastructure (Nested Stacks) ─────────────────────────────────────

Resources:

  CognitoStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infrastructure/cognito.yaml
      Parameters:
        Environment: !Ref Environment

  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infrastructure/dynamodb.yaml
      Parameters:
        Environment: !Ref Environment

  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infrastructure/s3-storage.yaml
      Parameters:
        Environment: !Ref Environment

# ── Sharp Lambda Layer ─────────────────────────────────────────────────────────

  SharpLayerStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: layers/sharp/template.yaml
      Parameters:
        Environment: !Ref Environment

# ── Shared HTTP API Gateway ───────────────────────────────────────────────────

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: ammas-banner API
      Auth:
        DefaultAuthorizer: CognitoJwtAuth
        Authorizers:
          CognitoJwtAuth:
            JwtConfiguration:
              issuer: !Sub
                - "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
                - UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
              audience:
                - !GetAtt CognitoStack.Outputs.AdminClientId
                - !GetAtt CognitoStack.Outputs.StoreClientId
            IdentitySource: $request.header.Authorization
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type
        MaxAge: 300

# ── Lambda Nested Stacks ──────────────────────────────────────────────────────
# Each Lambda registers its own route via the Events.Api property.
# All stacks receive the shared parameters they need.

  AuthPostConfirmStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/auth-post-confirm/template.yaml
      Parameters:
        Environment: !Ref Environment
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName

  AdminCreateClientStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/admin-create-client/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  AdminListClientsStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/admin-list-clients/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  AdminUpdateClientStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/admin-update-client/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  AdminDeleteClientStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/admin-delete-client/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  BranchesCreateStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/branches-create/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  BranchesListStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/branches-list/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  BranchesUpdateStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/branches-update/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  MediaListStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/media-list/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  MediaUploadUrlStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack, StorageStack]
    Properties:
      TemplateURL: lambdas/media-upload-url/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        MediaBucket: !GetAtt StorageStack.Outputs.MediaBucketName

  MediaDeleteStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack, StorageStack]
    Properties:
      TemplateURL: lambdas/media-delete/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        MediaBucket: !GetAtt StorageStack.Outputs.MediaBucketName

  MediaReorderStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/media-reorder/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

  MediaProcessorStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [DatabaseStack, StorageStack, SharpLayerStack]
    Properties:
      TemplateURL: lambdas/media-processor/template.yaml
      Parameters:
        Environment: !Ref Environment
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        MediaBucket: !GetAtt StorageStack.Outputs.MediaBucketName
        CdnDomain: !GetAtt StorageStack.Outputs.MediaCdnDomain
        SharpLayerArn: !GetAtt SharpLayerStack.Outputs.LayerArn

  DisplayGetCarouselStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [CognitoStack, DatabaseStack]
    Properties:
      TemplateURL: lambdas/display-get-carousel/template.yaml
      Parameters:
        Environment: !Ref Environment
        HttpApiId: !Ref Api
        MainTableName: !GetAtt DatabaseStack.Outputs.MainTableName
        EventsTableName: !GetAtt DatabaseStack.Outputs.EventsTableName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId

# ── Wire Cognito PostConfirmation trigger ─────────────────────────────────────
# The trigger must be set on the User Pool after the Lambda exists.

  CognitoPostConfirmTrigger:
    Type: AWS::Cognito::UserPoolLambdaConfig
    DependsOn: [CognitoStack, AuthPostConfirmStack]
    Properties:
      UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
      LambdaConfig:
        PostConfirmation: !GetAtt AuthPostConfirmStack.Outputs.FunctionArn

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:

  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !GetAtt CognitoStack.Outputs.UserPoolId

  AdminClientId:
    Description: Cognito App Client ID for admin dashboards
    Value: !GetAtt CognitoStack.Outputs.AdminClientId

  StoreClientId:
    Description: Cognito App Client ID for store kiosks
    Value: !GetAtt CognitoStack.Outputs.StoreClientId

  MediaBucketName:
    Description: S3 bucket for media uploads
    Value: !GetAtt StorageStack.Outputs.MediaBucketName

  MediaCdnDomain:
    Description: CloudFront domain for media delivery
    Value: !GetAtt StorageStack.Outputs.MediaCdnDomain
