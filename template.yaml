AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ammas-banner — Centralized Ad Carousel Board (root template)

# ── Parameters ────────────────────────────────────────────────────────────────

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
    Description: Deployment environment

# ── Globals ───────────────────────────────────────────────────────────────────

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures: [x86_64]
    CodeUri: ./
    Environment:
      Variables:
        NODE_ENV: !Ref Environment

# ── Resources ─────────────────────────────────────────────────────────────────

Resources:

  # ── Shared Infrastructure ────────────────────────────────────────────────────

  CognitoStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infrastructure/cognito.yaml
      Parameters:
        Environment: !Ref Environment

  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infrastructure/dynamodb.yaml
      Parameters:
        Environment: !Ref Environment

  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infrastructure/s3-storage.yaml
      Parameters:
        Environment: !Ref Environment

  SharpLayerStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: layers/sharp/template.yaml
      Parameters:
        Environment: !Ref Environment

  # ── Media S3 Bucket ───────────────────────────────────────────────────────────
  # Defined here (not in StorageStack) so SAM can wire S3 → Lambda notifications.

  MediaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "ammas-media-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*', 'Content-Type']
            MaxAge: 300

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${MediaBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub
                  - "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CdnId}"
                  - CdnId: !GetAtt StorageStack.Outputs.MediaCdnId

  # ── Shared HTTP API ──────────────────────────────────────────────────────────

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: ammas-banner API
      Auth:
        DefaultAuthorizer: CognitoJwtAuth
        Authorizers:
          CognitoJwtAuth:
            JwtConfiguration:
              issuer: !Sub
                - "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
                - UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
              audience:
                - !GetAtt CognitoStack.Outputs.AdminClientId
                - !GetAtt CognitoStack.Outputs.StoreClientId
            IdentitySource: $request.header.Authorization
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [Authorization, Content-Type]
        MaxAge: 300

  # ── Auth ─────────────────────────────────────────────────────────────────────

  AuthPostConfirmFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-auth-post-confirm-${Environment}"
      Handler: lambdas/auth-post-confirm/index.handler
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/auth-post-confirm/index.js]

  # ── Admin: Clients ───────────────────────────────────────────────────────────

  AdminCreateClientFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-admin-create-client-${Environment}"
      Handler: lambdas/admin-create-client/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
          USER_POOL_ID: !GetAtt CognitoStack.Outputs.UserPoolId
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /admin/clients
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
        - Statement:
            - Effect: Allow
              Action: [cognito-idp:AdminCreateUser, cognito-idp:AdminAddUserToGroup]
              Resource: !Sub
                - "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
                - UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/admin-create-client/index.js]

  AdminListClientsFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-admin-list-clients-${Environment}"
      Handler: lambdas/admin-list-clients/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /admin/clients
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/admin-list-clients/index.js]

  AdminUpdateClientFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-admin-update-client-${Environment}"
      Handler: lambdas/admin-update-client/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /admin/clients/{clientId}
            Method: PUT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/admin-update-client/index.js]

  AdminDeleteClientFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-admin-delete-client-${Environment}"
      Handler: lambdas/admin-delete-client/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /admin/clients/{clientId}
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/admin-delete-client/index.js]

  # ── Branches ─────────────────────────────────────────────────────────────────

  BranchesCreateFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-branches-create-${Environment}"
      Handler: lambdas/branches-create/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
          USER_POOL_ID: !GetAtt CognitoStack.Outputs.UserPoolId
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clients/{clientId}/branches
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
        - Statement:
            - Effect: Allow
              Action: [cognito-idp:AdminCreateUser, cognito-idp:AdminAddUserToGroup]
              Resource: !Sub
                - "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
                - UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/branches-create/index.js]

  BranchesListFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-branches-list-${Environment}"
      Handler: lambdas/branches-list/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clients/{clientId}/branches
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/branches-list/index.js]

  BranchesUpdateFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-branches-update-${Environment}"
      Handler: lambdas/branches-update/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clients/{clientId}/branches/{branchId}
            Method: PUT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/branches-update/index.js]

  # ── Media ─────────────────────────────────────────────────────────────────────

  MediaListFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-media-list-${Environment}"
      Handler: lambdas/media-list/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clients/{clientId}/branches/{branchId}/media
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/media-list/index.js]

  MediaUploadUrlFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-media-upload-url-${Environment}"
      Handler: lambdas/media-upload-url/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
          MEDIA_BUCKET: !GetAtt StorageStack.Outputs.MediaBucketName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clients/{clientId}/branches/{branchId}/media/upload-url
            Method: POST
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
        - S3WritePolicy:
            BucketName: !GetAtt StorageStack.Outputs.MediaBucketName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/media-upload-url/index.js]

  MediaDeleteFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-media-delete-${Environment}"
      Handler: lambdas/media-delete/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
          MEDIA_BUCKET: !GetAtt StorageStack.Outputs.MediaBucketName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clients/{clientId}/branches/{branchId}/media/{mediaId}
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
        - S3CrudPolicy:
            BucketName: !GetAtt StorageStack.Outputs.MediaBucketName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/media-delete/index.js]

  MediaReorderFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-media-reorder-${Environment}"
      Handler: lambdas/media-reorder/index.handler
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clients/{clientId}/branches/{branchId}/media/reorder
            Method: PUT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/media-reorder/index.js]

  MediaProcessorFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-media-processor-${Environment}"
      Handler: lambdas/media-processor/index.handler
      Timeout: 30
      MemorySize: 512
      Layers:
        - !GetAtt SharpLayerStack.Outputs.LayerArn
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
          MEDIA_BUCKET: !GetAtt StorageStack.Outputs.MediaBucketName
          CDN_DOMAIN: !GetAtt StorageStack.Outputs.MediaCdnDomain
      Events:
        S3Jpg:
          Type: S3
          Properties:
            Bucket: !Ref MediaBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - { Name: prefix, Value: clients/ }
                  - { Name: suffix, Value: .jpg }
        S3Jpeg:
          Type: S3
          Properties:
            Bucket: !Ref MediaBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - { Name: prefix, Value: clients/ }
                  - { Name: suffix, Value: .jpeg }
        S3Png:
          Type: S3
          Properties:
            Bucket: !Ref MediaBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - { Name: prefix, Value: clients/ }
                  - { Name: suffix, Value: .png }
        S3Webp:
          Type: S3
          Properties:
            Bucket: !Ref MediaBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - { Name: prefix, Value: clients/ }
                  - { Name: suffix, Value: .webp }
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
        - S3CrudPolicy:
            BucketName: !GetAtt StorageStack.Outputs.MediaBucketName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/media-processor/index.js]
        External: [sharp]

  # ── Display (TV) ─────────────────────────────────────────────────────────────

  DisplayGetCarouselFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-display-get-carousel-${Environment}"
      Handler: lambdas/display-get-carousel/index.handler
      Timeout: 10
      Environment:
        Variables:
          MAIN_TABLE: !GetAtt DatabaseStack.Outputs.MainTableName
          EVENTS_TABLE: !GetAtt DatabaseStack.Outputs.EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /display/{branchId}/carousel
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseStack.Outputs.MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/display-get-carousel/index.js]

  # ── Cognito PostConfirmation trigger ─────────────────────────────────────────

  CognitoPostConfirmTrigger:
    Type: AWS::Cognito::UserPoolLambdaConfig
    Properties:
      UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
      LambdaConfig:
        PostConfirmation: !GetAtt AuthPostConfirmFn.Arn

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:

  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !GetAtt CognitoStack.Outputs.UserPoolId

  AdminClientId:
    Description: Cognito App Client ID for admin dashboards
    Value: !GetAtt CognitoStack.Outputs.AdminClientId

  StoreClientId:
    Description: Cognito App Client ID for store kiosks
    Value: !GetAtt CognitoStack.Outputs.StoreClientId

  MediaBucketName:
    Description: S3 bucket for media uploads
    Value: !GetAtt StorageStack.Outputs.MediaBucketName

  MediaCdnDomain:
    Description: CloudFront domain for media delivery
    Value: !GetAtt StorageStack.Outputs.MediaCdnDomain
