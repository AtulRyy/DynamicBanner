AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GET /display/{branchId}/carousel — TV polling endpoint (cached 55s at CloudFront)

Parameters:
  Environment:    { Type: String }
  HttpApiId:      { Type: String }
  MainTableName:  { Type: String }
  EventsTableName: { Type: String }
  UserPoolId:     { Type: String }

Resources:
  Function:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-display-get-carousel-${Environment}"
      Handler: lambdas/display-get-carousel/index.handler
      Runtime: nodejs20.x
      CodeUri: ./
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          MAIN_TABLE: !Ref MainTableName
          EVENTS_TABLE: !Ref EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Path: /display/{branchId}/carousel
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/display-get-carousel/index.js]

Outputs:
  FunctionArn:  { Value: !GetAtt Function.Arn }
  FunctionName: { Value: !Ref Function }
