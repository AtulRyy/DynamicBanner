AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PUT /clients/{clientId}/branches/{branchId} — update branch name or location

Parameters:
  Environment:    { Type: String }
  HttpApiId:      { Type: String }
  MainTableName:  { Type: String }
  EventsTableName: { Type: String }
  UserPoolId:     { Type: String }

Resources:
  Function:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ammas-branches-update-${Environment}"
      Handler: lambdas/branches-update/index.handler
      Runtime: nodejs20.x
      CodeUri: ./
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          MAIN_TABLE: !Ref MainTableName
          EVENTS_TABLE: !Ref EventsTableName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Path: /clients/{clientId}/branches/{branchId}
            Method: PUT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints: [lambdas/branches-update/index.js]

Outputs:
  FunctionArn:  { Value: !GetAtt Function.Arn }
  FunctionName: { Value: !Ref Function }
